<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat</title>
<script src="https://js.puter.com/v2/"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; color: #fff; font-family: system-ui, sans-serif; height: 100dvh; display: flex; flex-direction: column; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-break: break-word; }
  .user { background: #3b82f6; align-self: flex-end; border-bottom-right-radius: 4px; }
  .ai { background: #1e1e1e; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #333; }
  .typing { opacity: 0.5; font-style: italic; }
  #bar { display: flex; gap: 8px; padding: 12px; border-top: 1px solid #222; background: #111; }
  #input { flex: 1; background: #1e1e1e; border: 1px solid #333; color: #fff; padding: 12px 16px; border-radius: 24px; font-size: 14px; outline: none; }
  #send { background: #3b82f6; color: #fff; border: none; padding: 12px 20px; border-radius: 24px; font-weight: bold; cursor: pointer; font-size: 14px; }
  #send:disabled { opacity: 0.4; }
</style>
</head>
<body>

<div id="messages">
  <div class="msg ai">👋 Hey! I'm your AI assistant. Ask me anything.</div>
</div>

<div id="bar">
  <input id="input" type="text" placeholder="Type a message..." />
  <button id="send" onclick="send()">Send</button>
</div>

<script>
  const messages = [];

  async function send() {
    const input = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    sendBtn.disabled = true;
    addMsg(text, 'user');
    messages.push({ role: 'user', content: text });

    const typing = addMsg('Thinking...', 'ai typing');

    try {
      const res = await puter.ai.chat(messages);
      const reply = res?.message?.content?.[0]?.text || res?.toString() || 'No response';
      typing.remove();
      addMsg(reply, 'ai');
      messages.push({ role: 'assistant', content: reply });
    } catch(e) {
      typing.remove();
      addMsg('Error: ' + e.message, 'ai');
    }

    sendBtn.disabled = false;
    input.focus();
  }

  function addMsg(text, cls) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    document.getElementById('messages').appendChild(div);
    div.scrollIntoView({ behavior: 'smooth' });
    return div;
  }

  document.getElementById('input').addEventListener('keydown', e => {
    if (e.key === 'Enter') send();
  });
</script>
</body>
</html>
